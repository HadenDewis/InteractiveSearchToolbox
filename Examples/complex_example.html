<html lang="en">

<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Search Toolbox</title>
    <script src="https://cdn.jsdelivr.net/gh/HadenDewis/InteractiveSearchToolbox@main/dist/IST.min.js"></script>
    <link href="https://cdn.jsdelivr.net/gh/HadenDewis/InteractiveSearchToolbox@main/dist/interactivesearchtoolbox.css"
        rel="stylesheet" type="text/css" />
</head>

<body>
    <script type="module">
        const VS_COLOURS = ["#ff643c", "#f73232", "#f50a64", "#eb00aa", "#b432b4", "#6e3bc8", "#2d78eb", "#35a5eb", "#30aaab", "#3c966e", "#3cc85a", "#78be00", "#bed200", "#ebeb00", "#d7c300", "#f0aa02"];
        const IST = new InteractiveSearchToolbox({ enableHDRI: true, enableAmbientLighting: true })

        // Preload everything here
        let modelsToLoad = ['Models/L.glb','Models/T.glb']
        
        IST.preLoadModels(modelsToLoad)
        
        IST.loadingManager.onLoad = function () {
            IST.init(); // Now we've loaded models, initiate the whole package

            // Init all other tools and packages
            let timeline = [];

            let trial = {
                type: canvasKeyboardResponse,
                on_start() {
                    trialSetup(); // Call this at the start of each trial - This is a user made function where we decide what we want in our trial and how to do it!
                },
                stimulus: function (canvas) {
                    canvas.style.display = 'none'; // Hide the jsPsych canvas by default.
                },
                on_finish() {
                    IST.trialCleanup(); // Call this at the end of every trial.
                },
                choices: ['e', 'i']
            }

            let goodbyeTrial = {
                type: htmlButtonResponse,
                stimulus: '<p>This is the end of the experiment. Press the button below to finish.</p>',
                choices: ['End Experiment'],
            }

            IST.camera.position.z = 150;
            IST.enableGazeContingentControls({maskType:'opaque'})
            IST.setGazeRadius(0.05,0.01)

            
            // You've seen some basic examples, so let's make a more complex gaze contingent style example!

            function trialSetup() {
                // Setup whatever you need to have in your trial here...
                // You can use any of the tools that come built into the toolbox to help make this easier

                // In this example we will make 16 shapes that can only be seen by moving the mouse over them.
                // 15 of these items will be L shapes and one of them will be a T shape.

                let objectsForScene = []

                let distractor = IST.findLoadedObject('Models/L.glb')
                let target = IST.findLoadedObject('Models/T.glb')
                // Here we're creating 15 distractor cubes
                for (let i = 0; i < 15; i++) {
                    let newObj = IST.cloneObject(distractor) // Clone the object

                    // Change the colour of the objects randomly
                    newObj.traverse(function (child) {
                        if (child.isMesh) {
                            child.material = new THREE.MeshStandardMaterial({ color: _.sample(VS_COLOURS) })
                        }
                    })

                    newObj.scale.set(0.15, 0.15, 0.15) // Make the object smaller

                    objectsForScene.push(newObj); // Add it to our stimuli array
                }

                // And then we will also add a single target cube
                let new_target_object = IST.cloneObject(target)
                new_target_object.traverse(function (child) {
                        if (child.isMesh) {
                            child.material = new THREE.MeshStandardMaterial({ color: _.sample(VS_COLOURS) })
                        }
                    })
                new_target_object.scale.set(0.15, 0.15, 0.15) // Make the object smaller
                objectsForScene.push(new_target_object); // Add it to our stimuli array

                // Place that array into the helper function - this will randomly place each object into the scene 
                IST.placeRandomly2D({
                    objectsToPlace:objectsForScene,
                    randomRotation: true,
                    spread: 5
                });

                
                //IST.enableOrbitControls();
                //IST.enableDragControls();
                //IST.enableDragToRotateControls();

                // Start the trial
                IST.startTrial();
            }

            // Add trial to the jsPsych timeline
            timeline.push(trial,goodbyeTrial);

            // Run the jsPsych timeline
            jsPsych.run(timeline); // Experiment begins now

        }



        
    </script>
</body>

</html>
